name: sqlmap
command: sqlmap
enabled: true
short_description: Automatic SQL injection scanner.
description: |
  sqlmap detects and exploits SQL injection flaws.
parameters:
  - name: target
    type: string
    description: Target URL with parameter.
    required: true
    flag: -u
    format: flag
    target_format: url
  - name: batch
    type: bool
    description: Run in non-interactive mode.
    required: false
    default: true
    flag: --batch
    format: flag
  - name: flush_session
    type: bool
    description: Flush stored session files for this target.
    required: false
    default: false
    flag: --flush-session
    format: flag
  - name: fresh_queries
    type: bool
    description: Ignore stored query results and re-test.
    required: false
    default: false
    flag: --fresh-queries
    format: flag
  - name: additional_args
    type: string
    description: Extra sqlmap arguments.
    required: false
    format: positional
    allowed_flags: [--level, --risk, --technique, --dbms, -p, --threads, --tamper]
timeout: 15m
install_hint: pip install sqlmap
tags: [web, sql, exploit]
