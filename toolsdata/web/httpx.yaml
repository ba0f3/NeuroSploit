name: httpx
command: httpx
args: ["-silent", "-status-code", "-title", "-tech-detect"]
enabled: true
short_description: HTTP probe (ProjectDiscovery httpx; adapts for Python/Kali httpx on PATH).
description: |
  Probes a URL for status, title, and technologies. Uses ProjectDiscovery httpx
  (`-u URL`) when that binary is on PATH; otherwise adapts to Python/Kali httpx
  (positional URL).
parameters:
  - name: target
    type: string
    description: Full URL to probe (e.g. https://example.com).
    required: true
    flag: -u
    format: flag
    target_format: url
  - name: follow_redirects
    type: bool
    description: Follow HTTP redirects.
    required: false
    default: true
    flag: -follow-redirects
    format: flag
  - name: additional_args
    type: string
    description: Extra httpx arguments.
    required: false
    format: positional
timeout: 2m
install_hint: go install github.com/projectdiscovery/httpx/cmd/httpx@latest | apt install python3-httpx
tags: [web, recon, http]
