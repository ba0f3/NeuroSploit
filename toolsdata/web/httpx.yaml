name: httpx
command: httpx
enabled: true
short_description: HTTP client probe (URL as positional argument).
description: |
  Sends an HTTP request to the target URL. On Debian/Kali /usr/bin/httpx is the
  Python HTTPX CLI (`httpx URL`). For ProjectDiscovery httpx, ensure ~/go/bin
  precedes /usr/bin in PATH or use curl/whatweb instead.
parameters:
  - name: target
    type: string
    description: Full URL to probe (e.g. https://example.com).
    required: true
    position: 0
    format: positional
    target_format: url
  - name: follow_redirects
    type: bool
    description: Follow HTTP redirects.
    required: false
    default: true
    flag: --follow-redirects
    format: flag
  - name: additional_args
    type: string
    description: Extra httpx arguments.
    required: false
    format: positional
timeout: 2m
install_hint: apt install python3-httpx | go install github.com/projectdiscovery/httpx/cmd/httpx@latest
tags: [web, recon, http]
