name: Go CI

on:
  push:
    branches: [main, master]
    paths:
      - "neurosploit-go/**"
      - "agents_md/**"
      - "Makefile"
      - ".github/workflows/go-ci.yml"
      - ".goreleaser.yaml"
  pull_request:
    paths:
      - "neurosploit-go/**"
      - "agents_md/**"
      - "Makefile"
      - ".github/workflows/go-ci.yml"
      - ".goreleaser.yaml"

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: neurosploit-go/go.mod
          cache-dependency-path: neurosploit-go/go.sum

      - name: Vet
        run: make vet

      - name: Test
        run: make test

  build:
    name: release build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: neurosploit-go/go.mod
          cache-dependency-path: neurosploit-go/go.sum

      - name: Build embedded release binary
        run: make build-release

      - name: Smoke test
        run: ./neurosploit-go/neurosploit --version

  goreleaser-check:
    name: goreleaser config
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: neurosploit-go/go.mod
          cache-dependency-path: neurosploit-go/go.sum

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
